<form
  id="tracked-models-form"
  class="mb-4 flex flex-wrap items-end gap-3 rounded border border-gray-200 bg-white p-4"
  hx-post="/tracked-models"
  hx-target="#tracked-models-list"
  hx-swap="innerHTML"
  hx-on::after-request="if(event.detail.successful) this.reset()"
>
  <div class="flex flex-col">
    <label for="make" class="text-xs font-medium text-gray-500">Make</label>
    <input
      type="text" id="make" name="make" required
      placeholder="e.g. Volvo"
      class="rounded border border-gray-300 px-2 py-1 text-sm"
    />
  </div>
  <div class="flex flex-col">
    <label for="model" class="text-xs font-medium text-gray-500">Model</label>
    <input
      type="text" id="model" name="model" required
      placeholder="e.g. V70"
      class="rounded border border-gray-300 px-2 py-1 text-sm"
    />
  </div>
  <div class="flex flex-col">
    <label for="variant" class="text-xs font-medium text-gray-500">Variant (optional)</label>
    <input
      type="text" id="variant" name="variant"
      placeholder="e.g. T5"
      class="rounded border border-gray-300 px-2 py-1 text-sm"
    />
  </div>
  <div class="pb-0.5">
    <button type="submit" class="rounded bg-gray-900 px-3 py-1.5 text-sm text-white hover:bg-gray-700">
      Add
    </button>
  </div>
</form>
