<form
  id="listings-filter-form"
  class="mb-4 flex flex-wrap items-end gap-3 rounded border border-gray-200 bg-white p-4"
  hx-get="/listings/table"
  hx-target="#listings-table"
  hx-swap="innerHTML"
  hx-trigger="change, submit"
>
  <div class="flex flex-col">
    <label for="make" class="text-xs font-medium text-gray-500">Make</label>
    <input
      type="text" id="make" name="make" value="{{ filters.make or '' }}"
      placeholder="e.g. Volvo"
      class="rounded border border-gray-300 px-2 py-1 text-sm"
    />
  </div>
  <div class="flex flex-col">
    <label for="model" class="text-xs font-medium text-gray-500">Model</label>
    <input
      type="text" id="model" name="model" value="{{ filters.model or '' }}"
      placeholder="e.g. V70"
      class="rounded border border-gray-300 px-2 py-1 text-sm"
    />
  </div>
  <div class="flex flex-col">
    <label for="dealer_id" class="text-xs font-medium text-gray-500">Dealer</label>
    <select id="dealer_id" name="dealer_id" class="rounded border border-gray-300 px-2 py-1 text-sm">
      <option value="">All dealers</option>
      {% for dealer in dealers %}
        <option value="{{ dealer.id }}" {% if filters.dealer_id == dealer.id %}selected{% endif %}>
          {{ dealer.name }}
        </option>
      {% endfor %}
    </select>
  </div>
  <div class="flex flex-col">
    <label for="min_price" class="text-xs font-medium text-gray-500">Min price (kr)</label>
    <input
      type="number" id="min_price" name="min_price" value="{{ filters.min_price or '' }}"
      min="0" step="1000"
      class="w-28 rounded border border-gray-300 px-2 py-1 text-sm"
    />
  </div>
  <div class="flex flex-col">
    <label for="max_price" class="text-xs font-medium text-gray-500">Max price (kr)</label>
    <input
      type="number" id="max_price" name="max_price" value="{{ filters.max_price or '' }}"
      min="0" step="1000"
      class="w-28 rounded border border-gray-300 px-2 py-1 text-sm"
    />
  </div>
  <div class="flex items-center gap-1.5 pb-1.5">
    <input
      type="checkbox" id="active_only" name="active_only" value="true"
      {% if filters.active_only %}checked{% endif %}
      class="rounded border-gray-300"
    />
    <label for="active_only" class="text-sm text-gray-700">Active only</label>
  </div>
  <div class="pb-0.5">
    <button type="submit" class="rounded bg-gray-900 px-3 py-1.5 text-sm text-white hover:bg-gray-700">
      Filter
    </button>
  </div>
</form>
