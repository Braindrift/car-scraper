<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}CarScraper{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="h-full bg-gray-50 text-gray-900">
    <nav class="bg-gray-900 text-white px-4 py-3 shadow">
      <div class="mx-auto max-w-6xl flex items-center gap-6">
        <span class="font-semibold text-lg">CarScraper</span>
        <a href="/" class="text-sm hover:text-gray-300">Dashboard</a>
        <a href="/tracked-models" class="text-sm hover:text-gray-300">Tracked Models</a>
        <a href="/stats" class="text-sm hover:text-gray-300">Stats</a>
      </div>
    </nav>
    <main class="mx-auto max-w-6xl px-4 py-6">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
